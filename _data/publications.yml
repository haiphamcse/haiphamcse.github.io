- id: semissc
  title: "Semi-supervised 3D Semantic Scene Completion with 2D Vision Foundation Model Guidance"
  venue: The 39th Annual AAAI Conference on Artificial Intelligence (AAAI 2025)
  description: "We propose a semi-supervised framework for 3D semantic occupancy prediction that reduces reliance on costly labeled data by leveraging 2D foundation models, achieving up to 85% of full-supervision performance with only 10% labeled data."
  project_page: https://haiphamcse.github.io
  arxiv: 2408.11559
