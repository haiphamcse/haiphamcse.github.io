- id: sharpdepth
  title: "SharpDepth: Sharpening Metric Depth Predictions Using Diffusion Distillation"
  venue: Under Review
  description: "SharpDepth combines the metric accuracy of discriminative methods with the boundary sharpness of generative models, achieving precise and detailed monocular depth estimation suitable for diverse real-world applications."
  project_page: https://haiphamcse.github.io
